# verify_jwt = false: invoked by pg_cron, which sends the sb_secret_*
# token via the `apikey` header only — no Authorization JWT. With
# verify_jwt = true the gateway rejected every cron tick with
# UNAUTHORIZED_NO_AUTH_HEADER before the function ran. The function
# instead authenticates the caller itself via requireAdminOrService
# (_shared/auth.ts), which accepts the cron token and admin user JWTs.
[functions.embed-scholarships]
verify_jwt = false

