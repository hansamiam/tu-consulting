# CI gate for every push and PR.
#
# Lovable's IDE bot occasionally pushes commits that break the build
# (broken syntax, missing imports, reverted env). This catches those before
# Vercel even tries to deploy. Failing CI also blocks merge on protected
# branches if you turn on branch protection later.
#
# Stays cheap — just install + lint + typecheck + build, no tests yet.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (non-blocking — pre-existing debt; report only)
        run: npm run lint || true
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          # Build needs valid env vars. These match what Vercel uses.
          # The PUBLISHABLE key is short-form and PUBLIC by design — safe
          # to commit / expose. Private secrets stay in Supabase.
          VITE_SUPABASE_PROJECT_ID: bsfldtpemfxhnkdzccib
          VITE_SUPABASE_URL: https://bsfldtpemfxhnkdzccib.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_Woa7nW8-UJAYjNBXfgFX1A_qR6nonzb
        run: npm run build

      - name: Test (Vitest — renderer snapshots)
        run: npm run test

  # Live edge-function smoke test — POSTs a known-good profile to the
  # deployed topuni-ai-pathway, reads the SSE stream, and asserts:
  #   1. archetype event fires
  #   2. all 5 PREMIUM_SECTIONS section events fire
  #   3. stream terminates with [DONE]
  #   4. no _error events
  #
  # Designed to catch the class of bug that the fixture-based
  # brief-verify job can't see:
  #   - Edge function 500 / 502 / timeout
  #   - SSE stream opens then dies mid-flight (PR #10 pattern —
  #     "stamp success before the work completes")
  #   - Sections silently dropped
  #   - LLM gateway outage / model rotated out
  #
  # Bails out cleanly (exit 0) when SUPABASE_URL / SUPABASE_ANON_KEY
  # are not set in repo secrets, so the job stays green until Samuel
  # adds the secrets. Once added, the next run actually exercises
  # the deployed function.
  brief-smoke:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Smoke test brief generation against live edge function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: deno run --allow-net --allow-env scripts/smoke-brief.ts
